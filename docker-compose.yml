services:
  redis:
    image: redis:7-alpine
    container_name: test-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ${REDIS_DATA_PATH:-/srv/redis_data}:/data
    networks:
      - jenkins-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  laravel-agent:
    build:
      context: ./laravel-agent
      args:
        DOCKER_GID: ${DOCKER_GID:-996}
    container_name: laravel-agent
    init: true
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${ANSIBLE_FILES_PATH:-/home/admin}:/ansible-files:ro
    environment:
      - JENKINS_URL=http://host.docker.internal:${JENKINS_HTTP_PORT:-8080}${JENKINS_PREFIX:-}
      - JENKINS_AGENT_NAME=${JENKINS_AGENT_NAME:-laravel-agent-1}
      - JENKINS_SECRET=${JENKINS_SECRET:?Set JENKINS_SECRET in .env}
      - JENKINS_WEB_SOCKET=true
      - JENKINS_AGENT_WORKDIR=/home/jenkins/agent
    networks:
      - jenkins-net
    depends_on:
      redis:
        condition: service_healthy

networks:
  jenkins-net:
    driver: bridge
