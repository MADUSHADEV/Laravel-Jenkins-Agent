services:
  jenkins-controller:
    image: ${JENKINS_CONTROLLER_IMAGE:-jenkins/jenkins:lts-jdk21}
    container_name: jenkins-controller
    restart: unless-stopped
    init: true
    ports:
      - "${JENKINS_HTTP_BIND:-127.0.0.1}:${JENKINS_HTTP_PORT:-8080}:8080"
    volumes:
      - ${JENKINS_HOME_PATH:-/srv/jenkins_home}:/var/jenkins_home
    environment:
      - JENKINS_OPTS=--prefix=${JENKINS_PREFIX:-/jenkins}
      - TZ=${TZ:-UTC}
    networks:
      - jenkins-net

  laravel-agent:
    build:
      context: ./laravel-agent
      args:
        DOCKER_GID: ${DOCKER_GID:-998}
    container_name: laravel-agent
    init: true
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${ANSIBLE_FILES_PATH:-/home/admin}:/ansible-files:ro
    environment:
      - JENKINS_URL=http://jenkins-controller:8080${JENKINS_PREFIX:-/jenkins}
      - JENKINS_AGENT_NAME=${JENKINS_AGENT_NAME:-laravel-agent-1}
      - JENKINS_SECRET=${JENKINS_SECRET:?Set JENKINS_SECRET in .env}
      - JENKINS_WEB_SOCKET=true
      - JENKINS_AGENT_WORKDIR=/home/jenkins/agent
    networks:
      - jenkins-net
    depends_on:
      - jenkins-controller

networks:
  jenkins-net:
    driver: bridge
